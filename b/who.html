<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="shortcut icon" href="/icons/who.ico">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #040810;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    body.fading {
      opacity: 0;
      transition: opacity 0.55s ease;
    }

    /* ── video background ── */
    .vid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .vid-bg video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      object-position: center bottom;
      filter: brightness(0.6) contrast(1.0);
      pointer-events: none;
      background: transparent;
      -webkit-media-controls: none;
    }

    .vid-bg video::-webkit-media-controls,
    .vid-bg video::-webkit-media-controls-enclosure,
    .vid-bg video::-webkit-media-controls-overlay-play-button,
    .vid-bg video::-webkit-media-controls-start-playback-button,
    .vid-bg video::-webkit-media-controls-panel {
      display: none !important;
      -webkit-appearance: none;
      opacity: 0 !important;
    }

    .vid-bg {
      background: linear-gradient(180deg, #06101e 0%, #081525 40%, #0a1c30 60%, #060f1a 80%, #020810 100%);
    }

    /* ── overlays ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 55%, rgba(2,5,16,0.25) 20%, rgba(2,5,16,0.72) 100%);
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(4,8,22,0.35) 0%,
        rgba(4,10,22,0.05) 25%,
        transparent 50%,
        transparent 100%
      );
    }

    /* ── back link ── */
    .back-link {
      position: fixed;
      top: 1.4rem;
      left: 1.6rem;
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(190,215,245,0.65);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding: 0.2rem 0.15rem;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.4s;
    }

    .back-link:hover {
      color: rgba(215,232,255,0.9);
      border-bottom-color: rgba(180,205,245,0.45);
    }

    @keyframes fadeInUI { to { opacity: 1; } }

    /* ── title ── */
    .title {
      position: fixed;
      top: 1.35rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: rgba(190,215,245,0.60);
      white-space: nowrap;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.6s;
    }

    /* ── branding ── */
    .branding {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.26em;
      color: rgba(170,200,240,0.33);
      text-transform: lowercase;
      white-space: nowrap;
      user-select: none;
    }

    /* ── profile row ── */
    .wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .row {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      gap: clamp(0.35rem, 1.5vw, 1.2rem);
      -webkit-flex-wrap: nowrap;
      flex-wrap: nowrap;
    }

    .profile {
      opacity: 0;
      animation: profileIn 0.8s ease forwards;
      position: relative;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      width: clamp(48px, 13vw, 130px);
      min-width: clamp(48px, 13vw, 130px);
      max-width: clamp(48px, 13vw, 130px);
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      gap: 0.3rem;
    }

    .profile:nth-child(1) { animation-delay: 0.3s; }
    .profile:nth-child(2) { animation-delay: 0.42s; }
    .profile:nth-child(3) { animation-delay: 0.54s; }
    .profile:nth-child(4) { animation-delay: 0.66s; }
    .profile:nth-child(5) { animation-delay: 0.78s; }
    .profile:nth-child(6) { animation-delay: 0.90s; }
    .profile:nth-child(7) { animation-delay: 1.02s; }

    @keyframes profileIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: clamp(48px, 13vw, 130px);
      height: clamp(48px, 13vw, 130px);
      min-width: clamp(48px, 13vw, 130px);
      min-height: clamp(48px, 13vw, 130px);
      border-radius: 4px;
      border: 1px solid rgba(80,120,190,0.28);
      background: rgba(3,6,18,0.55);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
      -webkit-flex-shrink: 0;
    }

    .avatar:hover {
      border-color: rgba(110,155,225,0.55);
      box-shadow: 0 0 24px rgba(60,105,210,0.18);
      transform: translateY(-2px);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: translateZ(0);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      will-change: transform;
      image-rendering: auto;
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* desktop / tablet default name style */
    .avatar-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(210,230,255,0.68);
      text-align: center;
      text-transform: lowercase;
      user-select: none;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      box-sizing: border-box;
    }

    /* player popup base */
    .player-popup {
      position: fixed;
      z-index: 100;
      width: 260px;
      background: rgba(3, 5, 14, 0.93);
      border: 1px solid rgba(80,120,190,0.18);
      border-radius: 6px;
      backdrop-filter: blur(22px);
      padding: 1.2rem;
      pointer-events: all;
      opacity: 0;
      transform: scale(0.93) translateY(10px);
      transition: opacity 0.28s cubic-bezier(.4,0,.2,1), transform 0.28s cubic-bezier(.4,0,.2,1);
    }

    .player-popup.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .player-popup.hidden {
      pointer-events: none;
    }

    .popup-inner {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .popup-top {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .popup-art {
      width: 46px;
      height: 46px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(80,120,190,0.2);
    }

    .popup-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-width: 0;
    }

    .popup-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(200,220,248,0.85);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-artist {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.16em;
      color: rgba(150,180,225,0.6);
      text-transform: lowercase;
    }

    .popup-progress {
      display: flex;
      flex-direction: column;
      gap: 0.32rem;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(80,120,190,0.12);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-track:hover .progress-fill {
      background: rgba(140,180,240,0.85);
    }

    .progress-fill {
      height: 100%;
      background: rgba(80,120,190,0.55);
      border-radius: 2px;
      width: 0%;
      transition: width 0.25s linear, background 0.2s;
      pointer-events: none;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
    }

    .progress-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: rgba(100,135,185,0.3);
    }

    .popup-controls {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.35rem;
      color: rgba(170,200,240,0.65);
      transition: color 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover {
      color: rgba(140,175,230,0.65);
      transform: scale(1.12);
    }

    .popup-vol {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .vol-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: rgba(100,135,185,0.3);
      text-transform: lowercase;
      flex-shrink: 0;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      background: rgba(80,120,190,0.12);
      outline: none;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(100,145,210,0.75);
      cursor: pointer;
      transition: background 0.2s;
    }

    .vol-slider::-webkit-slider-thumb:hover {
      background: rgba(120,158,218,0.6);
    }

    .vol-slider::-moz-range-thumb {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(100,145,210,0.75);
      border: none;
      cursor: pointer;
    }

    /* Tablet landscape */
    @media (min-width: 681px) and (max-width: 1100px) {
      .avatar {
        width: clamp(60px, 9vw, 100px) !important;
        height: clamp(60px, 9vw, 100px) !important;
      }
      .row {
        gap: clamp(0.3rem, 1vw, 0.8rem);
      }
      .avatar-name {
        font-size: 0.9rem;
        letter-spacing: 0.1em;
      }
    }

    /* ── MOBILE PORTRAIT: names stay on ONE LINE, boxes moved HIGHER ── */
    @media (max-width: 680px) {
      .wrap {
        padding: 5rem 1rem 1.8rem;
        align-items: flex-start;
        justify-content: flex-start;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: auto;
        align-items: start;
        justify-items: center;
        gap: 0.9rem 0.6rem;
        width: 100%;
        max-width: 540px;
        margin: 0 auto;
      }

      .profile:last-child:nth-child(3n+1) {
        grid-column: 2;
      }

      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        width: 100%;
        min-width: 0;
      }

      .avatar {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 1 / 1;
        position: relative !important;
        display: block;
      }

      .avatar img {
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }

      /* names always single line, never break */
      .avatar-name {
        white-space: nowrap !important;
        overflow: visible !important;
        text-overflow: clip !important;
        word-break: keep-all !important;
        font-size: clamp(0.68rem, 3.8vw, 0.95rem);
        letter-spacing: 0.05em;
        font-weight: 600;
        margin-top: 0.2rem;
        padding: 0 0.1rem;
        line-height: 1.2;
      }

      /* bottom sheet player on mobile */
      .player-popup {
        width: 100% !important;
        max-width: 100% !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        border-radius: 14px 14px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        transform: scale(1) translateY(110%);
        transition: opacity 0.28s cubic-bezier(.4,0,.2,1), transform 0.32s cubic-bezier(.4,0,.2,1);
        padding: 1.4rem 1.4rem 2rem;
      }

      .player-popup.visible {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    /* Phone landscape: names one line, smaller font */
    @media (max-height: 500px) and (orientation: landscape) {
      .wrap {
        padding: 2rem 0.8rem 1.4rem;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        overflow-y: auto;
      }

      .row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: center;
        gap: clamp(0.25rem, 1vw, 0.55rem) !important;
        width: 100%;
        max-width: 100%;
      }

      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 0.12rem;
        flex: 1 1 0;
        min-width: 0;
        max-width: calc((100% - 6 * clamp(0.25rem, 1vw, 0.55rem)) / 7);
      }

      .avatar {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 1 / 1 !important;
        position: relative !important;
        display: block;
      }

      .avatar img {
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }

      .avatar-name {
        font-size: clamp(0.55rem, 1.8vw, 0.7rem);
        white-space: nowrap;
        letter-spacing: 0.05em;
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
      }

      .back-link {
        font-size: 0.75rem;
        top: 0.5rem;
        left: 0.8rem;
      }

      .title {
        font-size: 0.7rem;
        top: 0.5rem;
        letter-spacing: 0.08em;
        max-width: calc(100% - 8rem);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .branding {
        bottom: 0.4rem;
        font-size: 0.7rem;
      }

      .player-popup {
        width: min(280px, 88vw) !important;
        max-height: calc(100dvh - 2rem);
        overflow-y: auto;
        padding: 0.8rem 1rem 1rem;
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) scale(0.93) !important;
        bottom: auto !important;
      }

      .player-popup.visible {
        transform: translate(-50%, -50%) scale(1) !important;
        opacity: 1;
      }
    }
  </style>

  </script>
</head>

  <script>
    // Video & autoplay robust
    const bgVid = document.getElementById('bgVid');
    bgVid.setAttribute('playsinline', '');
    bgVid.setAttribute('webkit-playsinline', '');
    bgVid.muted = true;
    bgVid.controls = false;
    function tryPlayVid() { bgVid.muted = true; const p = bgVid.play(); if (p !== undefined) p.catch(() => {}); }
    bgVid.load(); tryPlayVid();
    document.addEventListener('touchstart', () => { if (bgVid.paused) tryPlayVid(); }, { once: true });
    document.addEventListener('click', () => { if (bgVid.paused) tryPlayVid(); }, { once: true });
    function tryFallback() { bgVid.src = 'https://raw.githubusercontent.com/newyork482/adgsdaggdsdg/main/video/who.mp4'; bgVid.load(); tryPlayVid(); }
    bgVid.addEventListener('error', tryFallback, { once: true });

    // Night ambience — desktop only
    const isMobileWho = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    if (!isMobileWho) {
      const whoNight = document.getElementById('whoNightSounds');
      whoNight.volume = 0.018;
      whoNight.loop = true;
      function playWhoNight() { whoNight.play().catch(() => {}); }
      playWhoNight();
      document.addEventListener('mousemove', playWhoNight, { once: true });
      document.addEventListener('click', playWhoNight, { once: true });
    }
    


    // Helper: format time
    function fmt(s) { if (!isFinite(s)) return '—'; return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`; }
    
    // ---------- DESKTOP POPUP POSITIONING ----------
    function isMobile() { return window.innerWidth <= 680; }
    function isLandscapeMobile() { return window.innerHeight <= 500 && window.innerWidth > window.innerHeight; }
    
    function positionPopup(popupEl, avatarEl) {
      if (isMobile() || isLandscapeMobile()) return;
      const rect = avatarEl.getBoundingClientRect();
      const pw = popupEl.offsetWidth || 260;
      let left = rect.left + rect.width / 2 - pw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
      const ph = popupEl.offsetHeight || 180;
      const vhMax = window.innerHeight - 8;
      let top;
      if (rect.top > ph + 16) top = rect.top - ph - 12;
      else top = rect.bottom + 12;
      top = Math.min(top, vhMax - ph);
      top = Math.max(8, top);
      popupEl.style.top = top + 'px';
      popupEl.style.left = left + 'px';
    }
    
    // ---- Audio and popup management for all 7 players ----
    const playersData = [
      { audioId: 'trackAudio', popupId: 'playerPopup', avatarId: 'avatarMid', playBtnId: 'playPauseBtn', iconPlayId: 'iconPlay', iconPauseId: 'iconPause', fillId: 'progressFill', curId: 'timeCurrent', durId: 'timeDuration', trackId: 'progressTrack', volId: 'volSlider' },
      { audioId: 'trackAudio3', popupId: 'playerPopup3', avatarId: 'avatarSkai', playBtnId: 'playPauseBtn3', iconPlayId: 'iconPlay3', iconPauseId: 'iconPause3', fillId: 'progressFill3', curId: 'timeCurrent3', durId: 'timeDuration3', trackId: 'progressTrack3', volId: 'volSlider3' },
      { audioId: 'trackAudio4', popupId: 'playerPopup4', avatarId: 'avatarPachelbel', playBtnId: 'playPauseBtn4', iconPlayId: 'iconPlay4', iconPauseId: 'iconPause4', fillId: 'progressFill4', curId: 'timeCurrent4', durId: 'timeDuration4', trackId: 'progressTrack4', volId: 'volSlider4' },
      { audioId: 'trackAudio5', popupId: 'playerPopup5', avatarId: 'avatarUnki', playBtnId: 'playPauseBtn5', iconPlayId: 'iconPlay5', iconPauseId: 'iconPause5', fillId: 'progressFill5', curId: 'timeCurrent5', durId: 'timeDuration5', trackId: 'progressTrack5', volId: 'volSlider5' },
      { audioId: 'trackAudio6', popupId: 'playerPopup6', avatarId: 'avatarMetallica', playBtnId: 'playPauseBtn6', iconPlayId: 'iconPlay6', iconPauseId: 'iconPause6', fillId: 'progressFill6', curId: 'timeCurrent6', durId: 'timeDuration6', trackId: 'progressTrack6', volId: 'volSlider6' },
    ];
    
    let popupStates = new Array(7).fill(false);
    const audios = playersData.map(p => document.getElementById(p.audioId));
    const popups = playersData.map(p => document.getElementById(p.popupId));
    const avatars = playersData.map(p => document.getElementById(p.avatarId));
    
    // Helper: pause all except given audio
    function pauseAllExcept(keepAudio) {
      audios.forEach((aud, idx) => {
        if (aud !== keepAudio && !aud.paused) {
          aud.pause();
          const iconPlay = document.getElementById(playersData[idx].iconPlayId);
          const iconPause = document.getElementById(playersData[idx].iconPauseId);
          if (iconPlay && iconPause) { iconPlay.style.display = 'block'; iconPause.style.display = 'none'; }
        }
      });
    }
    
    // Initialize each player
    playersData.forEach((data, idx) => {
      const audio = audios[idx];
      const popup = popups[idx];
      const avatar = avatars[idx];
      const playBtn = document.getElementById(data.playBtnId);
      const iconPlay = document.getElementById(data.iconPlayId);
      const iconPause = document.getElementById(data.iconPauseId);
      const fill = document.getElementById(data.fillId);
      const timeCur = document.getElementById(data.curId);
      const timeDur = document.getElementById(data.durId);
      const track = document.getElementById(data.trackId);
      const volSlider = document.getElementById(data.volId);
      
      if (audio) audio.volume = 0.8;
      if (volSlider) volSlider.addEventListener('input', () => { if (audio) audio.volume = parseFloat(volSlider.value); });
      if (playBtn) {
        playBtn.addEventListener('click', () => {
          if (audio.paused) {
            pauseAllExcept(audio);
            audio.play();
            if (iconPlay && iconPause) { iconPlay.style.display = 'none'; iconPause.style.display = 'block'; }
          } else {
            audio.pause();
            if (iconPlay && iconPause) { iconPlay.style.display = 'block'; iconPause.style.display = 'none'; }
          }
        });
      }
      if (audio) {
        audio.addEventListener('timeupdate', () => {
          if (audio.duration && fill) fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
          if (timeCur) timeCur.textContent = fmt(audio.currentTime);
        });
        audio.addEventListener('loadedmetadata', () => { if (timeDur) timeDur.textContent = fmt(audio.duration); });
      }
      if (track && audio) {
        track.addEventListener('click', e => { const rect = track.getBoundingClientRect(); audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; });
      }
      
      // Popup toggle with desktop positioning
      if (avatar && popup) {
        avatar.addEventListener('click', (e) => {
          e.stopPropagation();
          for (let i = 0; i < popups.length; i++) {
            if (i !== idx && popupStates[i]) {
              popups[i].classList.remove('visible');
              setTimeout(() => popups[i].classList.add('hidden'), 300);
              popupStates[i] = false;
            }
          }
          if (popupStates[idx]) {
            popup.classList.remove('visible');
            setTimeout(() => popup.classList.add('hidden'), 300);
            popupStates[idx] = false;
          } else {
            popup.classList.remove('hidden');
            if (!isMobile() && !isLandscapeMobile()) positionPopup(popup, avatar);
            popup.getBoundingClientRect();
            popup.classList.add('visible');
            popupStates[idx] = true;
          }
        });
      }
    });
    
    // Global click to close popups
    document.addEventListener('click', (e) => {
      for (let i = 0; i < popups.length; i++) {
        const pop = popups[i];
        if (popupStates[i] && pop && !pop.contains(e.target)) {
          pop.classList.remove('visible');
          setTimeout(() => pop.classList.add('hidden'), 300);
          popupStates[i] = false;
        }
      }
    });
    popups.forEach(pop => { if (pop) pop.addEventListener('click', e => e.stopPropagation()); });
    
    // Reposition popups on resize (desktop)
    window.addEventListener('resize', () => {
      if (!isMobile() && !isLandscapeMobile()) {
        for (let i = 0; i < popups.length; i++) {
          if (popupStates[i]) positionPopup(popups[i], avatars[i]);
        }
      }
    });
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        if (!isMobile() && !isLandscapeMobile()) {
          for (let i = 0; i < popups.length; i++) {
            if (popupStates[i]) positionPopup(popups[i], avatars[i]);
          }
        }
      }, 100);
    });
  </script>
