<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/icons/index.ico">
  <link rel="shortcut icon" href="/icons/index.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>rapture</title>
  <meta name="description" content="rapture season">
  <meta property="og:title" content="rapture">
  <meta property="og:description" content="rapture season">
  <meta property="og:image" content="https://raw.githubusercontent.com/newyork482/adgsdaggdsdg/main/icons/eye.png">
  <meta property="og:url" content="https://igotyou.lol">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="rapture">
  <meta name="twitter:description" content="rapture season">
  <meta name="twitter:image" content="https://raw.githubusercontent.com/newyork482/adgsdaggdsdg/main/icons/eye.png">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      overflow: hidden;
      height: 100%;
      background: #060d10;
    }

    body {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      font-family: 'Cormorant Garamond', serif;
      background: transparent;
      opacity: 1;
      transition: opacity 0.55s ease;
      position: relative;
    }
    body.fading {
      opacity: 0;
    }

    /* fixed background layers */
    .outside {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(180deg, #030a0e 0%, #061218 35%, #071a16 65%, #041210 100%);
      overflow: hidden;
    }

    .outside video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center bottom;
      filter: brightness(1.1) contrast(1.0);
      pointer-events: none;
    }

    .outside video::-webkit-media-controls,
    .outside video::-webkit-media-controls-enclosure,
    .outside video::-webkit-media-controls-overlay-play-button,
    .outside video::-webkit-media-controls-panel { display: none !important; opacity: 0 !important; }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(3,10,14,0.4) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* top-right who link */
    .who-link {
      position: fixed;
      top: 1.4rem;
      right: 1.6rem;
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(200,230,220,0.7);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding: 0.2rem 0.15rem;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.5s;
    }

    .who-link:hover {
      color: rgba(220,245,238,0.95);
      border-bottom-color: rgba(180,220,210,0.4);
    }

    @keyframes fadeInUI {
      to { opacity: 1; }
    }

    /* now playing + volume */
    .top-left {
      position: fixed;
      top: 1.4rem;
      left: 1.6rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      opacity: 0;
      transition: opacity 2s ease;
    }
    .top-left.visible { opacity: 1; }

    .np-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .np-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3a7060;
      animation: pulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    .np-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.13em;
      color: rgba(200,230,220,0.38);
    }
    .np-title { color: rgba(200,230,220,0.68); }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-left: 0.05rem;
    }

    .vol-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: rgba(190,220,210,0.6);
      text-transform: lowercase;
      user-select: none;
    }

    .vol-track {
      position: relative;
      width: 70px;
      height: 30px;
      display: flex;
      align-items: center;
      cursor: pointer;
      touch-action: none;
      z-index: 50;
    }
    .vol-track-bg {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #152e28;
      border-radius: 2px;
    }
    .vol-track-fill {
      position: absolute;
      left: 0;
      height: 2px;
      background: #3a7060;
      border-radius: 2px;
    }
    .vol-thumb {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a7060;
      transform: translateX(-50%);
      transition: background 0.2s;
    }
    .vol-track:hover .vol-thumb { background: rgba(100,200,170,0.8); }

    /* main content – scrollable area */
    .wrap {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.2rem;
      padding: 5rem 2rem 6rem 2rem;
      min-height: 100%;
      width: 100%;
    }

    .sentence {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .static-word {
      font-family: 'IM Fell English', serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 400;
      color: rgba(190,215,208,0.62);
      letter-spacing: 0.04em;
    }

    .word-slot {
      min-width: 180px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      overflow: hidden;
    }

    .word-display {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 400;
      color: rgba(140,200,185,0.62);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .word-display.spinning {
      animation: flicker 0.09s linear infinite;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      50%  { opacity: 0.1; }
      100% { opacity: 1; }
    }

    .divider {
      width: 36px;
      height: 1px;
      background: rgba(80,160,130,0.18);
    }

    .spin-btn {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180,220,210,0.35);
      color: rgba(190,225,215,0.72);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      padding: 0.5rem 0.2rem;
      cursor: pointer;
      text-transform: lowercase;
      transition: color 0.3s, border-color 0.3s;
    }

    .spin-btn:hover {
      color: rgba(220,248,240,0.95);
      border-color: rgba(180,230,215,0.5);
    }

    .spin-btn.running {
      pointer-events: none;
      color: rgba(40,80,60,0.2);
      border-color: rgba(40,80,60,0.1);
    }

    .branding {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.26em;
      color: rgba(180,215,205,0.33);
      text-transform: lowercase;
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
    }

    /* FIX: Safari landscape overlap & spacing */
    @media (orientation: landscape) and (max-height: 550px) {
      .wrap {
        gap: 1.5rem;
        padding: 2.5rem 2rem 3.5rem 2rem;
      }
      .static-word, .word-display {
        font-size: clamp(1.6rem, 4vw, 2.5rem);
      }
      .word-slot {
        min-width: 140px;
      }
      .spin-btn {
        font-size: 1rem;
        margin-top: 0.2rem;
      }
      .branding {
        font-size: 0.7rem;
        bottom: 0.7rem;
      }
      .top-left {
        top: 0.8rem;
        left: 1rem;
      }
      .who-link {
        top: 0.8rem;
        right: 1rem;
        font-size: 0.85rem;
      }
    }

    /* extra safety for very small heights */
    @media (max-height: 480px) and (orientation: landscape) {
      .wrap {
        gap: 1rem;
        padding: 1.5rem 1rem 2rem 1rem;
      }
    }
  </style>
</head>
<body>

<div class="outside">
  <video id="bgVid" autoplay muted loop playsinline webkit-playsinline x-webkit-airplay="deny" disableRemotePlayback preload="metadata">
    <source src="/video/index.mp4" type="video/mp4">
    <source src="https://raw.githubusercontent.com/newyork482/adgsdaggdsdg/main/video/index.mp4" type="video/mp4">
  </video>
</div>
<div class="vignette"></div>

<a class="who-link" id="whoLink" href="#">who</a>

<div class="top-left" id="topLeft">
  <div class="np-row">
    <div class="np-dot"></div>
    <div class="np-text">now playing &nbsp;<span class="np-title">yesterday — vs self</span></div>
  </div>
  <div class="vol-row">
    <span class="vol-label">vol</span>
    <div class="vol-track" id="volTrack">
      <div class="vol-track-bg"></div>
      <div class="vol-track-fill" id="volFill" style="width:80%"></div>
      <div class="vol-thumb" id="volThumb" style="left:80%"></div>
    </div>
  </div>
</div>

<div class="branding">rapture®</div>

<audio id="audio" loop preload="auto">
  <source src="https://raw.githubusercontent.com/newyork482/igotyoulol/main/music/song.mp3" type="audio/mpeg">
</audio>
<audio id="nightSounds" loop preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/1153/1153-preview.mp3" type="audio/mpeg">
</audio>

<div class="wrap">
  <div class="sentence">
    <span class="static-word">rapture</span>
    <div class="word-slot">
      <span class="word-display" id="word">season</span>
    </div>
  </div>
  <div class="divider"></div>
  <button class="spin-btn" id="btn">again</button>
</div>

<script>
  
  (function disableInspect() {
    // block right-click
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });

    // block F12, Ctrl+Shift+I, Ctrl+Shift+C, Ctrl+Shift+J, Ctrl+U, Ctrl+Shift+U, Cmd+Option+I (mac), etc.
    document.addEventListener('keydown', function(e) {
      // F12
      if (e.key === 'F12' || e.keyCode === 123) {
        e.preventDefault();
        return false;
      }
      // Ctrl+Shift+I / Cmd+Option+I (dev tools)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
        e.preventDefault();
        return false;
      }
      // Ctrl+Shift+C (inspect element)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) {
        e.preventDefault();
        return false;
      }
      // Ctrl+Shift+J (console)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
        e.preventDefault();
        return false;
      }
      // Ctrl+U / Cmd+U (view source)
      if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
        e.preventDefault();
        return false;
      }
      // Ctrl+Shift+U
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
        e.preventDefault();
        return false;
      }
      // prevent debugging shortcut (F12 handled, also inspect element)
    });

    // additional: disable long-press on links / images to avoid "inspect" context menu on safari? already covered
    // disable text selection via CSS already in *
    // disable dragging of images / elements
    window.addEventListener('dragstart', e => e.preventDefault());
  })();

  // ----------------------------------------------
  // who link + fade transition
  // ----------------------------------------------
  document.getElementById('whoLink').addEventListener('click', function(e) {
    e.preventDefault();
    document.body.classList.add('fading');
    setTimeout(() => {
      window.location.href = '/b/who.html';
    }, 560);
  });

  // ----------------------------------------------
  // Audio + volume controls
  // ----------------------------------------------
  const audioEl = document.getElementById('audio');
  const nightSoundsEl = document.getElementById('nightSounds');
  const topLeftDiv = document.getElementById('topLeft');

  audioEl.volume = 0.8;

  const volTrack = document.getElementById('volTrack');
  const volFill = document.getElementById('volFill');
  const volThumb = document.getElementById('volThumb');

  function setVol(clientX) {
    const rect = volTrack.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    audioEl.volume = pct;
    volFill.style.width = (pct * 100) + '%';
    volThumb.style.left = (pct * 100) + '%';
  }

  let dragging = false;
  volTrack.addEventListener('mousedown', e => { dragging = true; setVol(e.clientX); });
  window.addEventListener('mousemove', e => { if (dragging) setVol(e.clientX); });
  window.addEventListener('mouseup', () => { dragging = false; });

  let touchDragging = false;
  volTrack.addEventListener('touchstart', e => {
    e.preventDefault();
    touchDragging = true;
    setVol(e.touches[0].clientX);
  }, { passive: false });
  window.addEventListener('touchmove', e => {
    if (!touchDragging) return;
    e.preventDefault();
    setVol(e.touches[0].clientX);
  }, { passive: false });
  window.addEventListener('touchend', () => { touchDragging = false; });

  // ----------------------------------------------
  // Word spinner logic (rapture filler)
  // ----------------------------------------------
  const words = [
    "season", "time", "calls", "waits", "arrives",
    "never sleeps", "finds you", "knows", "sees all", "remembers",
    "forgives", "endures", "begins", "returns", "remains",
    "fades slow", "cuts deep", "burns bright", "hits different", "stays",
    "heals", "breaks", "builds", "falls", "rises",
    "is near", "is now", "is real", "is quiet", "is loud",
    "runs deep", "runs cold", "runs dry", "never lies", "never ends",
    "has no mercy", "has no clock", "has no map", "has no name",
    "takes its time", "takes everything", "takes nothing back",
    "leaves marks", "leaves scars", "leaves beauty",
    "speaks first", "speaks last", "speaks true",
    "is patient", "is certain", "is violent", "is tender",
    "was always here", "was always you", "was always this",
    "chose you", "chose silence", "chose fire",
    "feels heavy", "feels close", "feels like truth",
    "moves slow", "moves fast", "moves like water",
    "sounds like rain", "sounds like nothing", "sounds like everything",
    "looks like peace", "looks like war", "looks like home",
    "lives in the dark", "lives in the quiet", "lives in you",
    "will find you", "will pass", "will matter"
  ];

  let currentWord = "season";
  let spinning = false;
  let musicStarted = false;
  let spinInterval = null;

  const wordEl = document.getElementById('word');
  const spinBtn = document.getElementById('btn');

  function spin() {
    if (spinning) return;
    spinning = true;

    if (spinInterval) {
      clearInterval(spinInterval);
      spinInterval = null;
    }

    // start audio on first user gesture
    if (!musicStarted) {
      audioEl.play().then(() => {
        topLeftDiv.classList.add('visible');
      }).catch(() => {});
      musicStarted = true;
    }

    spinBtn.classList.add('running');
    wordEl.classList.add('spinning');

    const pool = words.filter(w => w !== currentWord);
    const nextWord = pool[Math.floor(Math.random() * pool.length)];
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    let ticks = 0;
    const totalTicks = 20 + Math.floor(Math.random() * 10);

    spinInterval = setInterval(() => {
      wordEl.textContent = shuffled[ticks % shuffled.length];
      ticks++;
      if (ticks >= totalTicks) {
        clearInterval(spinInterval);
        spinInterval = null;
        wordEl.textContent = nextWord;
        currentWord = nextWord;
        wordEl.classList.remove('spinning');
        spinBtn.classList.remove('running');
        spinning = false;
      }
    }, 70);
  }

  // attach event (inline onclick was present but also ensures duplicate safety)
  spinBtn.addEventListener('click', spin);

  // small improvement: disable spin if already running and ensure no double initialization
  // also ensure that the initial 'season' doesn't block music start: user must click again
  // optionally preload metadata? fine.

  // safety: on any user tap to document, if audio not started and user clicks 'again' it will start.
  // also prevent any default action on button if needed.
  // Video background autoplay
  const bgVid = document.getElementById('bgVid');
  if (bgVid) {
    bgVid.muted = true;
    bgVid.controls = false;
    function tryPlayBgVid() { bgVid.muted = true; const p = bgVid.play(); if (p !== undefined) p.catch(() => {}); }
    bgVid.load(); tryPlayBgVid();
    document.addEventListener('touchstart', () => { if (bgVid.paused) tryPlayBgVid(); }, { once: true });
    document.addEventListener('click', () => { if (bgVid.paused) tryPlayBgVid(); }, { once: true });
  }

  // Night ambience — desktop only
  const isMobileIndex = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (!isMobileIndex) {
    nightSoundsEl.volume = 0.018;
    nightSoundsEl.loop = true;
    function playNight() { nightSoundsEl.play().catch(() => {}); }
    playNight();
    document.addEventListener('mousemove', playNight, { once: true });
    document.addEventListener('click', playNight, { once: true });
  }

  // Safari landscape overlap fix already applied by CSS and flexible wrap.
  window.addEventListener('resize', () => {
    // responsive layout
  });

  spinBtn.addEventListener('contextmenu', (e) => e.preventDefault());
  document.querySelector('.who-link')?.addEventListener('contextmenu', (e) => e.preventDefault());
  
  window.addEventListener('orientationchange', () => {
    setTimeout(() => {
      // layout refresh on orientation change
    }, 30);
  });
</script>
</body>
</html>
